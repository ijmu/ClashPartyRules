# Clash Party / Mihomo YAML 覆写
# 设计目标：AI、大陆直连、海外媒体，以及香港/美国/台湾/日本/新加坡/其他国家手动选择。
# 此文件会保留订阅中的 proxies 与 proxy-providers，但替换代理组和路由规则。

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🌍 其他国家"
      - "🌐 全部节点"
      - DIRECT

  - name: "🤖 AI"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇹🇼 台湾"
      - "🇭🇰 香港"
      - "🌍 其他国家"
      - "🚀 节点选择"
      - DIRECT

  - name: "🎬 海外媒体"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🌍 其他国家"
      - DIRECT

  - name: "🇨🇳 大陆直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🌍 其他国家"
      - DIRECT

  - name: "🇭🇰 香港"
    type: select
    include-all: true
    filter: '(?i)(香港|Hong\s*Kong|\bHK\b|🇭🇰)'

  - name: "🇺🇸 美国"
    type: select
    include-all: true
    filter: '(?i)(美国|美國|United\s*States|\bUSA?\b|洛杉矶|洛杉磯|西雅图|西雅圖|纽约|紐約|硅谷|矽谷|圣何塞|聖荷西|达拉斯|達拉斯|芝加哥|🇺🇸)'

  - name: "🇹🇼 台湾"
    type: select
    include-all: true
    filter: '(?i)(台湾|台灣|Taiwan|\bTW\b|台北|新北|彰化|高雄|🇹🇼)'

  - name: "🇯🇵 日本"
    type: select
    include-all: true
    filter: '(?i)(日本|Japan|\bJP\b|东京|東京|大阪|埼玉|川日|泉日|🇯🇵)'

  - name: "🇸🇬 新加坡"
    type: select
    include-all: true
    filter: '(?i)(新加坡|Singapore|\bSG\b|\bSIN\b|狮城|獅城|坡|🇸🇬)'

  - name: "🌍 其他国家"
    type: select
    include-all: true
    exclude-filter: '(?i)(香港|Hong\s*Kong|\bHK\b|🇭🇰|美国|美國|United\s*States|\bUSA?\b|洛杉矶|洛杉磯|西雅图|西雅圖|纽约|紐約|硅谷|矽谷|圣何塞|聖荷西|达拉斯|達拉斯|芝加哥|🇺🇸|台湾|台灣|Taiwan|\bTW\b|台北|新北|彰化|高雄|🇹🇼|日本|Japan|\bJP\b|东京|東京|大阪|埼玉|川日|泉日|🇯🇵|新加坡|Singapore|\bSG\b|\bSIN\b|狮城|獅城|坡|🇸🇬)'

  - name: "🌐 全部节点"
    type: select
    include-all: true

rules:
  # 局域网与保留地址
  - IP-CIDR,127.0.0.0/8,🇨🇳 大陆直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🇨🇳 大陆直连,no-resolve
